<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Bank Complaint System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='sunset.css') }}">
</head>
<body>
    <!-- Back to Home Button -->
    <a href="{{ url_for('index') }}" style="position: fixed; top: 20px; left: 20px; background: rgba(255,255,255,0.9); backdrop-filter: blur(5px); padding: 10px 20px; border-radius: 40px; text-decoration: none; color: #ff6b35; font-weight: 600; z-index: 100;">
        ← 🏠 Back to Home
    </a>

    <div class="auth-container" style="min-height: 100vh; display: flex; justify-content: center; align-items: center;">
        <div class="glass-card" style="max-width: 500px; width: 90%; padding: 40px;">
            <div style="text-align: center; margin-bottom: 30px;">
                <h2 style="background: linear-gradient(135deg, #ff7e5f, #feb47b); -webkit-background-clip: text; background-clip: text; color: transparent;">📝 Create Account</h2>
                <p style="color: #6b4c3a;">Register as a new employee</p>
            </div>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% for category, message in messages %}
                    <div class="toast {{ category }}" style="margin-bottom: 20px; position: static;">{{ message }}</div>
                {% endfor %}
            {% endwith %}
            
            <form method="POST">
                <div class="form-group">
                    <label>👤 Username *</label>
                    <input type="text" name="username" required placeholder="Choose a username">
                </div>
                <div class="form-group">
                    <label>📧 Email *</label>
                    <input type="email" name="email" required placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>📞 Mobile (Optional)</label>
                    <input type="tel" name="mobile" placeholder="10-digit mobile">
                </div>
                <div class="form-group">
                    <label>🔒 Password *</label>
                    <input type="password" name="password" required placeholder="Minimum 6 characters">
                </div>
                <button type="submit" class="btn-primary" style="width: 100%;">Register</button>
            </form>
            
            <div style="text-align: center; margin-top: 20px;">
                <!-- FIXED: auth.login instead of login -->
                <a href="{{ url_for('auth.login') }}" style="color: #000000;">Already have an account? Login</a>
            </div>
        </div>
    </div>

    <script>
        for (let i = 0; i < 20; i++) {
            let particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.width = Math.random() * 5 + 2 + 'px';
            particle.style.height = particle.style.width;
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 8 + 's';
            document.body.appendChild(particle);
        }
    </script>
</body>
</html>
