<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - Bank Complaint System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='sunset.css') }}">
    <style>
        .back-dashboard {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
            padding: 10px 20px;
            border-radius: 40px;
            text-decoration: none;
            color: var(--deep-orange);
            font-weight: 600;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .back-dashboard:hover {
            background: var(--gradient-warm);
            color: white;
            transform: translateX(-5px);
        }
    </style>
</head>
<body>
    <a href="{{ url_for('admin_dashboard') if user.role == 'admin' else url_for('clerk_dashboard') }}" class="back-dashboard">
        ← 📊 Back to Dashboard
    </a>

    <div class="container" style="max-width: 500px; margin-top: 50px;">
        <div class="glass-card" style="padding: 30px;">
            <h2 style="text-align: center; margin-bottom: 30px;">🔑 Change Password</h2>
            
            <form id="passwordForm" onsubmit="changePassword(event)">
                <div class="form-group">
                    <label>Current Password</label>
                    <input type="password" name="current_password" required>
                </div>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" name="new_password" required minlength="6">
                </div>
                <div class="form-group">
                    <label>Confirm New Password</label>
                    <input type="password" name="confirm_password" required>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%;">Update Password</button>
            </form>
            <div id="resultArea" style="margin-top: 20px;"></div>
        </div>
    </div>

    <script>
        for (let i = 0; i < 20; i++) {
            let particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.width = Math.random() * 5 + 2 + 'px';
            particle.style.height = particle.style.width;
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 8 + 's';
            document.body.appendChild(particle);
        }

        async function changePassword(event) {
            event.preventDefault();
            const formData = new FormData(event.target);
            
            if (formData.get('new_password') !== formData.get('confirm_password')) {
                showMessage('New passwords do not match!', 'error');
                return;
            }
            
            const response = await fetch('/change_password', {
                method: 'POST',
                body: formData
            });
            const result = await response.json();
            
            if (result.success) {
                showMessage('✅ Password updated successfully!', 'success');
                event.target.reset();
                setTimeout(() => {
                    window.location.href = '/auth/login';
                }, 2000);
            } else {
                showMessage('❌ ' + result.error, 'error');
            }
        }
        
        function showMessage(msg, type) {
            const div = document.getElementById('resultArea');
            div.innerHTML = `<div class="toast ${type}" style="position: static; margin-top: 20px;">${msg}</div>`;
            setTimeout(() => div.innerHTML = '', 3000);
        }
    </script>
</body>
</html>
