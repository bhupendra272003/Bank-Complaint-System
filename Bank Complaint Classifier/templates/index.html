<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Complaint System - Customer Portal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='sunset.css') }}">
    <style>
        .staff-login {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
            padding: 10px 20px;
            border-radius: 40px;
            text-decoration: none;
            color: var(--deep-warm);
            font-weight: 600;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255, 126, 95, 0.3);
            z-index: 10;
        }
        .staff-login:hover {
            background: var(--gradient-warm);
            color: white;
            transform: translateY(-2px);
        }
        .track-link {
            text-align: center;
            margin-top: 20px;
        }
        .track-link a {
            color: var(--deep-warm);
            text-decoration: none;
            font-weight: 500;
        }
        .track-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <!-- Staff Login Button -->
    <a href="{{ url_for('auth.login') }}" class="staff-login">
        🔐 Staff Login →
    </a>

    <div class="container">
        <div class="header">
            <h1>🏦 Bank Complaint Management System</h1>
            <p>AI-Powered Customer Complaint Classification & Tracking</p>
        </div>

        <div class="glass-card" style="padding: 30px;">
            <h2 style="margin-bottom: 20px;">📝 Register Your Complaint</h2>
            
            <form id="complaintForm" onsubmit="submitComplaint(event)">
                <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="form-group">
                        <label>👤 Full Name *</label>
                        <input type="text" name="customer_name" required placeholder="Enter your full name">
                    </div>
                    <div class="form-group">
                        <label>📞 Mobile Number *</label>
                        <input type="tel" name="mobile" required placeholder="10-digit mobile" pattern="[0-9]{10}">
                    </div>
                </div>

                <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="form-group">
                        <label>🆔 PAN / Aadhaar *</label>
                        <input type="text" name="id_number" required placeholder="Enter PAN or Aadhaar">
                    </div>
                    <div class="form-group">
                        <label>📧 Email (Optional)</label>
                        <input type="email" name="email" placeholder="customer@example.com">
                    </div>
                </div>

                <div class="form-group">
                    <label>💬 Complaint Description *</label>
                    <textarea name="complaint" required placeholder="Describe your issue in detail..."></textarea>
                </div>

                <button type="submit" class="btn-primary" style="width: 100%;">🚀 Submit Complaint</button>
            </form>

            <div id="resultArea"></div>
            
            <div class="track-link">
                <a href="{{ url_for('track_complaint') }}">🔍 Track your complaint status →</a>
            </div>
        </div>
    </div>

    <script>
        for (let i = 0; i < 30; i++) {
            let particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.width = Math.random() * 5 + 2 + 'px';
            particle.style.height = particle.style.width;
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 8 + 's';
            document.body.appendChild(particle);
        }

        async function submitComplaint(event) {
            event.preventDefault();
            const formData = new FormData(event.target);
            const resultArea = document.getElementById('resultArea');
            
            resultArea.innerHTML = '<div class="toast info" style="position: static;">Processing...</div>';
            
            try {
                const response = await fetch('/submit_complaint', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                
                if (result.error) {
                    resultArea.innerHTML = `<div class="toast error" style="position: static;">❌ ${result.error}</div>`;
                } else {
                    resultArea.innerHTML = `
                        <div class="glass-card" style="padding: 20px; margin-top: 20px;">
                            <h3 style="color: var(--deep-orange);">✅ Complaint Registered!</h3>
                            <div style="margin-top: 15px;">
                                <p><strong>Complaint ID:</strong> <span style="font-size: 20px; font-weight: bold;">${result.complaint_id}</span></p>
                                <p><strong>Category:</strong> ${result.category}</p>
                                <p><strong>Priority:</strong> ${result.priority}</p>
                                <p><strong>Customer:</strong> ${result.customer_name}</p>
                                <p><strong>Mobile:</strong> ${result.mobile}</p>
                            </div>
                            <hr style="margin: 15px 0; border-color: #ffe0cc;">
                            <small>📱 Use this Complaint ID to track your status online.</small>
                        </div>
                    `;
                    event.target.reset();
                }
            } catch (error) {
                resultArea.innerHTML = `<div class="toast error" style="position: static;">❌ Network error</div>`;
            }
        }
    </script>
</body>
</html>
