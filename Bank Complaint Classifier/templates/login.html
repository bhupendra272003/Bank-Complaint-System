<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Bank Complaint System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='sunset.css') }}">
</head>
<body>
    <!-- Back to Home Button -->
    <a href="{{ url_for('index') }}" style="position: fixed; top: 20px; left: 20px; background: rgba(41, 41, 41, 0.9); backdrop-filter: blur(5px); padding: 10px 20px; border-radius: 40px; text-decoration: none; color: #ff6b35; font-weight: 600; z-index: 100;">
        ← 🏠 Back to Home
    </a>

    <div class="auth-container" style="min-height: 100vh; display: flex; justify-content: center; align-items: center;">
        <div class="glass-card" style="max-width: 450px; width: 90%; padding: 40px;">
            <div style="text-align: center; margin-bottom: 30px;">
                <h2 style="background: linear-gradient(135deg, #ff7e5f, #feb47b); -webkit-background-clip: text; background-clip: text; color: transparent;">🏦 Welcome Back</h2>
                <p style="color: #6b4c3a;">Login to your account</p>
            </div>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% for category, message in messages %}
                    <div class="toast {{ category }}" style="margin-bottom: 20px; position: static;">{{ message }}</div>
                {% endfor %}
            {% endwith %}
            
            <form method="POST">
                <div class="form-group">
                    <label>👤 Username</label>
                    <input type="text" name="username" placeholder="Enter username" required style="width: 100%;">
                </div>
                <div class="form-group">
                    <label>🔒 Password</label>
                    <input type="password" name="password" placeholder="Enter password" required style="width: 100%;">
                </div>
                <button type="submit" class="btn-primary" style="width: 100%;">Login</button>
            </form>
            
            <div style="text-align: center; margin-top: 20px;">
                <p style="color: #ffffff; font-size: 12px;">
                    Demo Credentials:<br>
                    Manager: manager / admin123<br>
                    Clerk: clerk1 / clerk123
                </p>
                <!-- FIXED: auth.register instead of register -->
                <a href="{{ url_for('auth.register') }}" style="color:black;">Register new account</a>
            </div>
        </div>
    </div>

    <script>
        for (let i = 0; i < 20; i++) {
            let particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.width = Math.random() * 5 + 2 + 'px';
            particle.style.height = particle.style.width;
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 8 + 's';
            document.body.appendChild(particle);
        }
    </script>
</body>
</html>
